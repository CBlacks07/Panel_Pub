<script>
        function addToCartAnimation() {
            const cartBtn = document.getElementById('cart-btn');
            cartBtn.classList.remove('bounce-animation');
            void cartBtn.offsetWidth; // Trigger reflow
            cartBtn.classList.add('bounce-animation');
        }

        // Horizontal category pill scrolling effect
        const pillScroll = document.querySelector('.pill-scroll');
        let isDown = false;
        let startX;
        let scrollLeft;

        pillScroll.addEventListener('mousedown', (e) => {
            isDown = true;
            startX = e.pageX - pillScroll.offsetLeft;
            scrollLeft = pillScroll.scrollLeft;
        });
        pillScroll.addEventListener('mouseleave', () => { isDown = false; });
        pillScroll.addEventListener('mouseup', () => { isDown = false; });
        pillScroll.addEventListener('mousemove', (e) => {
            if (!isDown) return;
            e.preventDefault();
            const x = e.pageX - pillScroll.offsetLeft;
            const walk = (x - startX) * 2;
            pillScroll.scrollLeft = scrollLeft - walk;
        });

        // Simple active pill toggle
        const pills = document.querySelectorAll('.pill-scroll button');
        pills.forEach(pill => {
            pill.addEventListener('click', () => {
                pills.forEach(p => {
                    p.classList.remove('bg-primary', 'text-on-primary');
                    p.classList.add('bg-white', 'text-on-surface-variant', 'border-outline-variant');
                });
                pill.classList.add('bg-primary', 'text-on-primary');
                pill.classList.remove('bg-white', 'text-on-surface-variant', 'border-outline-variant');
            });
        });
    </script>
